<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 简历岗位匹配系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #f5f6fa;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 32px;
            font-size: 28px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }
        .card label {
            display: block;
            color: #555;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .card textarea {
            width: 100%;
            min-height: 140px;
            padding: 12px;
            border: 1px solid #dce1e8;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            transition: border-color 0.2s;
        }
        .card textarea:focus {
            outline: none;
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.1);
        }
        .btn-wrapper {
            text-align: center;
            margin: 24px 0;
        }
        button {
            background: #4a90d9;
            color: #fff;
            border: none;
            padding: 12px 48px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #357abd;
        }
        button:disabled {
            background: #a0c4e8;
            cursor: not-allowed;
        }
        .error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            border-radius: 8px;
            padding: 12px 16px;
            color: #cf1322;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        .result-card pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .result-card .score {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 16px;
        }
        .result-card .section {
            margin-bottom: 16px;
        }
        .result-card .section h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .result-card .section .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .result-card .section .tag {
            background: #eef2f7;
            color: #4a6fa5;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 13px;
        }
        .summary-text {
            color: #555;
            font-size: 14px;
            line-height: 1.8;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
            display: none;
        }
        .agent-answer {
            background: #f8fafc;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
            display: none;
        }
        .divider {
            border: none;
            border-top: 2px solid #eef2f7;
            margin: 32px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>AI 简历岗位匹配系统</h1>

    <div class="card">
        <label for="resumeText">简历内容</label>
        <textarea id="resumeText" placeholder="请粘贴您的简历内容..."></textarea>
    </div>

    <div class="card">
        <label for="jobDescription">岗位 JD</label>
        <textarea id="jobDescription" placeholder="请粘贴目标岗位描述..."></textarea>
    </div>

    <div class="btn-wrapper">
        <button id="analyzeBtn" onclick="analyze()">开始分析</button>
    </div>

    <div class="error" id="errorBox"></div>
    <div class="loading" id="loadingBox">正在分析中，请稍候...</div>

    <div class="card result-card" id="resultCard" style="display: none;">
        <h2 style="margin-bottom: 16px;">分析结果</h2>
        <div id="resultBody"></div>
    </div>

    <hr class="divider">

    <h2 style="text-align:center;color:#2c3e50;margin-bottom:20px;">AI 求职 Agent 问答</h2>

    <div class="card">
        <label for="agentQuestion">你的问题</label>
        <textarea id="agentQuestion" placeholder="例如：我接下来一个月应该重点学习什么？" style="min-height:80px;"></textarea>
    </div>

    <div class="btn-wrapper">
        <button id="agentBtn" onclick="askAgent()">向 Agent 提问</button>
    </div>

    <div class="error" id="agentErrorBox"></div>
    <div class="loading" id="agentLoadingBox">Agent 正在思考...</div>

    <div class="agent-answer" id="agentAnswer"></div>
</div>

<script>
async function analyze() {
    const resumeText = document.getElementById('resumeText').value.trim();
    const jobDescription = document.getElementById('jobDescription').value.trim();

    if (!resumeText || !jobDescription) {
        showError('请填写简历内容和岗位描述');
        return;
    }

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.textContent = '分析中...';
    hideError();
    showLoading();
    hideResult();

    try {
        const response = await fetch('/api/analysis/match', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ resumeText, jobDescription })
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.message || '请求失败');
        }

        const result = await response.json();

        if (result.code !== 200) {
            throw new Error(result.message || '分析失败');
        }

        renderResult(result.data);
    } catch (e) {
        showError(e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '开始分析';
        hideLoading();
    }
}

function renderResult(data) {
    const body = document.getElementById('resultBody');

    let html = '<div class="score">匹配度：' + (data.matchScore ?? '-') + ' 分</div>';

    if (data.matchedSkills && data.matchedSkills.length) {
        html += renderTags('已匹配技能', data.matchedSkills);
    }
    if (data.missingSkills && data.missingSkills.length) {
        html += renderTags('缺失技能', data.missingSkills);
    }
    if (data.projectSuggestions && data.projectSuggestions.length) {
        html += renderList('项目建议', data.projectSuggestions);
    }
    if (data.learningPlan && data.learningPlan.length) {
        html += renderList('学习计划', data.learningPlan);
    }
    if (data.resumeSuggestions && data.resumeSuggestions.length) {
        html += renderList('简历优化建议', data.resumeSuggestions);
    }
    if (data.summary) {
        html += '<div class="section"><h3>总结</h3><p class="summary-text">' + escapeHtml(data.summary) + '</p></div>';
    }

    html += '<div class="section"><h3>原始 JSON</h3><pre>' + JSON.stringify(data, null, 2) + '</pre></div>';

    body.innerHTML = html;
    showResult();
}

function renderTags(title, items) {
    let html = '<div class="section"><h3>' + title + '</h3><div class="tags">';
    items.forEach(function(item) {
        html += '<span class="tag">' + escapeHtml(item) + '</span>';
    });
    html += '</div></div>';
    return html;
}

function renderList(title, items) {
    let html = '<div class="section"><h3>' + title + '</h3><ul style="padding-left:18px;color:#555;line-height:2;">';
    items.forEach(function(item) {
        html += '<li>' + escapeHtml(item) + '</li>';
    });
    html += '</ul></div>';
    return html;
}

function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
}

function showError(msg) {
    var el = document.getElementById('errorBox');
    el.textContent = msg;
    el.style.display = 'block';
}

function hideError() {
    document.getElementById('errorBox').style.display = 'none';
}

function showLoading() {
    document.getElementById('loadingBox').style.display = 'block';
}

function hideLoading() {
    document.getElementById('loadingBox').style.display = 'none';
}

function showResult() {
    document.getElementById('resultCard').style.display = 'block';
}

function hideResult() {
    document.getElementById('resultCard').style.display = 'none';
}

async function askAgent() {
    const question = document.getElementById('agentQuestion').value.trim();
    if (!question) {
        showAgentError('请输入你的问题');
        return;
    }

    const btn = document.getElementById('agentBtn');
    btn.disabled = true;
    btn.textContent = '提问中...';
    hideAgentError();
    showAgentLoading();
    hideAgentAnswer();

    try {
        const response = await fetch('/api/agent/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question })
        });

        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.message || '请求失败');
        }

        const result = await response.json();

        if (result.code !== 200) {
            throw new Error(result.message || '提问失败');
        }

        const el = document.getElementById('agentAnswer');
        el.textContent = result.data;
        el.style.display = 'block';
    } catch (e) {
        showAgentError(e.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '向 Agent 提问';
        hideAgentLoading();
    }
}

function showAgentError(msg) {
    var el = document.getElementById('agentErrorBox');
    el.textContent = msg;
    el.style.display = 'block';
}

function hideAgentError() {
    document.getElementById('agentErrorBox').style.display = 'none';
}

function showAgentLoading() {
    document.getElementById('agentLoadingBox').style.display = 'block';
}

function hideAgentLoading() {
    document.getElementById('agentLoadingBox').style.display = 'none';
}

function showAgentAnswer() {
    document.getElementById('agentAnswer').style.display = 'block';
}

function hideAgentAnswer() {
    document.getElementById('agentAnswer').style.display = 'none';
}
</script>
</body>
</html>
