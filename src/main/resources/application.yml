server:
  port: 8080

spring:
  application:
    name: ai-career-agent

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:ai_career_agent}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.xfl.aicareeragent: ${LOG_LEVEL:debug}

deepseek:
  base-url: https://api.deepseek.com
  api-key: ${DEEPSEEK_API_KEY}
  model: deepseek-v4-flash
  thinking: disabled